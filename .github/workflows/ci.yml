# .github/workflows/ci.yml

name: Kitchen Management CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run unit tests
        run: cd backend && npm test
        env:
          MONGO_URI: mongodb://localhost:27017/kitchendb_test

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t kitchen-backend ./backend

      - name: Build Frontend Image
        run: docker build -t kitchen-frontend ./frontend

      - name: Build Selenium Image
        run: docker build -t kitchen-selenium ./selenium

  selenium-tests:
    name: Selenium UI Tests
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d mongo backend seeder frontend
          sleep 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install selenium pytest pytest-html

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        run: |
          cd selenium
          pytest tests/ -v --html=report.html --self-contained-html
        continue-on-error: true

      - name: Upload Selenium report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-report
          path: selenium/report.html

      - name: Tear down
        if: always()
        run: docker compose down
