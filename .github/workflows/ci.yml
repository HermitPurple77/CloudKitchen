# .github/workflows/ci.yml

name: Kitchen Management CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Verify Docker Images
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Build backend image
      - name: Build Backend Image
        run: docker build -t kitchen-backend ./backend

      # Step 4: Build frontend image
      - name: Build Frontend Image
        run: docker build -t kitchen-frontend ./frontend

      # Step 5: Run docker-compose to verify full stack
      - name: Verify Docker Compose
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down

