# .github/workflows/ci.yml

name: Kitchen Management CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run unit tests
        run: cd backend && npm test
        env:
          MONGO_URI: mongodb://localhost:27017/kitchendb_test

  # ── 2. Build Docker Images ───────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t kitchen-backend ./backend

      - name: Build Frontend Image
        run: docker build -t kitchen-frontend ./frontend

      - name: Build Selenium Image
        run: docker build -t kitchen-selenium ./selenium

  # ── 3. Selenium UI Tests ─────────────────────────────────────────────────────
  selenium-tests:
    name: Selenium UI Tests
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d mongo backend seeder frontend
          sleep 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install selenium pytest pytest-html

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        run: |
          cd selenium
          pytest tests/ -v --html=report.html --self-contained-html
        continue-on-error: true

      - name: Upload Selenium report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-report
          path: selenium/report.html

      - name: Tear down
        if: always()
        run: docker compose down

  # ── 4. Deploy Frontend → GitHub Pages ───────────────────────────────────────
  # Only on push to main, only after all tests pass.
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: selenium-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Inject the live backend URL into config.js before deploying.
      # Set BACKEND_URL as a GitHub Secret pointing to wherever your
      # backend is running (e.g. a VPS, Railway, or your own server).
      # If not set, it falls back to localhost (useful for local dev).
      - name: Inject backend URL into config.js
        run: |
          BACKEND="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND" ]; then
            echo "⚠️  BACKEND_URL secret not set — keeping localhost default"
          else
            echo "🔧 Setting backend to: $BACKEND"
            sed -i "s|http://localhost:5000|${BACKEND}|g" frontend/config.js
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload frontend to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the frontend folder
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: |
          echo "🚀 Frontend live at: ${{ steps.deployment.outputs.page_url }}"
