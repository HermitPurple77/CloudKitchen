name: CloudKitchen CI/CD (Express Backend)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudkitchen
  PYTHON_VERSION: "3.11"

jobs:
  # ─── 1. PYTHON API + INTEGRATION TESTS ──────────────────────────────────────
  test:
    name: pytest (API tests)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip

    - name: Install Python deps
      run: |
        pip install -r requirements-dev.txt

    - name: Run pytest (NO coverage - Express backend)
      run: |
        pytest tests/ -v --tb=short

    # ─── 2. NODE + SELENIUM E2E TESTS ──────────────────────────────────────────
  e2e:
    name: Node + Selenium UI tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install deps
      run: |
        cd backend && npm ci
        pip install -r requirements-dev.txt

    - name: Start Express server
      run: |
        cd backend
        npm start &  # or "node server.js &"
        npx wait-on http://localhost:3000

    - name: Run Selenium E2E tests
      run: |
        pytest tests/e2e -v -m e2e --tb=short

    # ─── 3. DOCKER BUILD & PUSH ─────────────────────────────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.DOCKER_IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max