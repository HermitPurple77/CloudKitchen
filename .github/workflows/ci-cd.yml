name: CloudKitchen CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudkitchen
  PYTHON_VERSION: "3.11"

jobs:
  # ─── 1. LINT & UNIT TESTS ────────────────────────────────────────────────────
  test:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest

    services:
      # Spin up a real Postgres for integration tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: kitchen
          POSTGRES_PASSWORD: kitchen
          POSTGRES_DB: cloudkitchen_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://kitchen:kitchen@localhost:5432/cloudkitchen_test
          ENVIRONMENT: test
        run: |
          pytest tests/unit tests/integration \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── 2. SELENIUM E2E TESTS ───────────────────────────────────────────────────
  selenium:
    name: Selenium UI tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Start FastAPI server (background)
        env:
          DATABASE_URL: sqlite:///./test_e2e.db
          ENVIRONMENT: test
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait until the server is up
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run Selenium tests
        env:
          BASE_URL: http://localhost:8000
          HEADLESS: "true"
        run: |
          pytest tests/e2e \
            -v \
            --tb=short \
            -m selenium

      - name: Upload Selenium screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: tests/e2e/screenshots/
          retention-days: 7

  # ─── 3. DOCKER BUILD & PUSH ──────────────────────────────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: [test, selenium]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
