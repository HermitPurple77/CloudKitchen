name: CloudKitchen CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudkitchen
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─── 1. NODE BACKEND LINT & BASIC CHECK ──────────────────────────────────────
  backend-check:
    name: Backend — Node.js checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run Node.js lint (if configured)
        working-directory: backend
        run: npm run lint --if-present

      - name: Check server starts without crashing
        working-directory: backend
        env:
          PORT: 8000
          NODE_ENV: test
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:8000/health || curl -sf http://localhost:8000/
          kill $SERVER_PID

  # ─── 2. PYTEST (unit + integration) ──────────────────────────────────────────
  test:
    name: pytest — unit & integration
    runs-on: ubuntu-latest
    needs: backend-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (to run the API server)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start Express API server (background)
        working-directory: backend
        env:
          PORT: 8000
          NODE_ENV: test
        run: |
          node server.js &
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run pytest (unit + integration)
        env:
          BASE_URL: http://localhost:8000
        run: |
          pytest tests/test_menu.py tests/test_orders.py tests/test_order_flow.py \
            --cov=tests \
            --cov-report=xml \
            --cov-report=term-missing \
            -v -m "not selenium"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── 3. SELENIUM E2E TESTS ───────────────────────────────────────────────────
  selenium:
    name: Selenium — UI tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Set up Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Start Express server (background)
        working-directory: backend
        env:
          PORT: 8000
          NODE_ENV: test
          STATIC_DIR: ../frontend
        run: |
          node server.js &
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run Selenium tests
        env:
          BASE_URL: http://localhost:8000
          HEADLESS: "true"
        run: |
          pytest tests/test_ui.py -v -m selenium --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: tests/screenshots/
          retention-days: 7

  # ─── 4. DOCKER BUILD & PUSH ──────────────────────────────────────────────────
  docker:
    name: Docker — build & push
    runs-on: ubuntu-latest
    needs: [test, selenium]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
