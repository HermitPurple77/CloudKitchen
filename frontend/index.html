<!-- frontend/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="staff.css" />
</head>
<body>

  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;">
          <span class="logo-icon">🍳</span>
          <div>
            <h1>KitchenOS</h1>
            <p class="tagline">Staff & Schedule Manager</p>
          </div>
        </a>
      </div>
      <nav class="nav">
        <a href="index.html" class="nav-link active">Tasks</a>
        <a href="staff.html" class="nav-link">Staff</a>
        <a href="schedule.html" class="nav-link">Schedule</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Add Task Form -->
    <section class="form-section">
      <div class="section-label">NEW ASSIGNMENT</div>
      <form id="task-form">
        <div class="form-grid">
          <div class="field">
            <label>Task / Duty</label>
            <input type="text" id="title" placeholder="e.g. Prep vegetables" required />
          </div>
          <div class="field">
            <label>Staff Member</label>
            <select id="staff" required>
              <option value="">Select staff member</option>
            </select>
          </div>
          <div class="field">
            <label>Shift</label>
            <select id="shift" required>
              <option value="">Select shift</option>
              <option value="Morning (6AM–2PM)">Morning (6AM–2PM)</option>
              <option value="Afternoon (2PM–10PM)">Afternoon (2PM–10PM)</option>
              <option value="Night (10PM–6AM)">Night (10PM–6AM)</option>
            </select>
          </div>
        </div>
        <button type="submit" id="submit-btn">
          <span>Add Assignment</span>
          <span class="btn-arrow">→</span>
        </button>
      </form>
    </section>

    <!-- Task List -->
    <section class="list-section">
      <div class="section-label">ACTIVE BOARD</div>
      <div id="loading" class="loading">Loading assignments…</div>
      <div id="task-list" class="task-list"></div>
      <div id="empty" class="empty-state" style="display:none;">
        <span>No assignments yet. Add one above.</span>
      </div>
    </section>
  </main>

  <footer>
    <span>KitchenOS · BCA DevOps Project · Built with Node.js + MongoDB + Docker</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
